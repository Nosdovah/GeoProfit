<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoProfit UMKM - React App</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 1rem;
        }
        p {
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            background: #0284c7;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0369a1;
        }
        code {
            background: #0f172a;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GeoProfit UMKM</h1>
        <p>The GeoProfit UMKM application has been upgraded to a modern <strong>React + Vite</strong> architecture.</p>
        <p>The main source code is now located in the <code>frontend/</code> directory.</p>
        <p>To run the application locally:</p>
        <p><code>cd frontend && npm install && npm run dev</code></p>
        <a href="https://Nosdovah.github.io/GeoProfit/" class="btn">View Deployed Application</a>
    </div>
</body>
</html>
